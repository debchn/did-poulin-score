project_id = "did-poulin-score"

[api]
enabled          = true
port             = 54321
schemas          = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows         = 1000

[db]
port         = 54322
shadow_port  = 54320
major_version = 17

[studio]
enabled = true
port    = 54323

[inbucket]
enabled = true
port    = 54324

[storage]
enabled = true

[auth]
enabled                       = true
site_url                      = "https://did-poulin-score.pages.dev"
additional_redirect_urls      = ["http://localhost:5173"]
jwt_expiry                    = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval  = 10
enable_signup                 = true

[auth.rate_limit]
# Requests per hour per IP
email_sent                    = 10
sms_sent                      = 10
anonymous_users               = 30
token_refresh                 = 150
sign_in_sign_ups              = 30
token_verifications           = 30

[auth.email]
enable_signup         = true
double_confirm_changes = true
enable_confirmations  = false

[auth.external.google]
enabled   = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret    = "env(GOOGLE_CLIENT_SECRET)"
# redirect_uri is auto-set to https://<project-ref>.supabase.co/auth/v1/callback
